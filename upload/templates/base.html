<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Data File Manager{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Nav -->
<nav class="bg-indigo-700 text-white px-6 py-3 flex items-center gap-4 shadow">
  <a href="/" class="font-bold text-lg tracking-tight">Data File Manager</a>
  <span class="text-indigo-300 text-sm">/ PPM Data Stack</span>
  <div class="ml-auto flex gap-3 text-sm">
    <a href="/" class="hover:text-indigo-200">Files</a>
    <a href="/load-examples" class="hover:text-indigo-200">Load Examples</a>
  </div>
</nav>

<div class="max-w-7xl mx-auto px-4 py-6">
  {% block content %}{% endblock %}
</div>

</body>
</html>

services:
  # Main PostgreSQL Data Warehouse — contains all databases
  postgres:
    image: postgres:15-alpine
    container_name: ppm-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-15432}:5432"
    volumes:
      - ${VOLUME_BASE_PATH:-./volumes}/postgres:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ppm-network

  # Ensures ppmdatastack database exists in the main postgres instance
  postgres-init:
    image: postgres:15-alpine
    container_name: ppm-postgres-init
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ppm-network
    restart: no
    command: >
      sh -c "
        PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB -tc
        \"SELECT 1 FROM pg_database WHERE datname='ppmdatastack'\" | grep -q 1 ||
        PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB
        -c \"CREATE DATABASE ppmdatastack; GRANT ALL PRIVILEGES ON DATABASE ppmdatastack TO $$POSTGRES_USER;\"
      "

  dlt:
    image: python:3.11-slim
    container_name: ppm-dlt
    working_dir: /app
    env_file: .env
    environment:
      DESTINATION__POSTGRES__CREDENTIALS__DATABASE: ${POSTGRES_DB}
      DESTINATION__POSTGRES__CREDENTIALS__USERNAME: ${POSTGRES_USER}
      DESTINATION__POSTGRES__CREDENTIALS__PASSWORD: ${POSTGRES_PASSWORD}
      DESTINATION__POSTGRES__CREDENTIALS__HOST: postgres
      DESTINATION__POSTGRES__CREDENTIALS__PORT: 5432
      SOURCES__JIRA__SUBDOMAIN: ${JIRA_SUBDOMAIN}
      SOURCES__JIRA__EMAIL: ${JIRA_EMAIL}
      SOURCES__JIRA__API_TOKEN: ${JIRA_API_TOKEN}
    volumes:
      - ./dlt:/app
      - ${VOLUME_BASE_PATH:-./volumes}/dlt:/root/.dlt
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ppm-network
    restart: unless-stopped
    command: >
      sh -c "pip install --no-cache-dir -r /app/requirements.txt -q &&
             echo '[DLT] Ready.' && tail -f /dev/null"

  mage:
    image: mageai/mageai:latest
    container_name: ppm-mage
    command: >
      sh -c "pip install --no-cache-dir -r /home/src/requirements.txt -q &&
             mage start default_repo"
    env_file: .env
    environment:
      USER_CODE_PATH: /home/src
      MAGE_DATABASE_CONNECTION_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/mage_metadata
      POSTGRES_DBNAME: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      DESTINATION__POSTGRES__CREDENTIALS__DATABASE: ${POSTGRES_DB}
      DESTINATION__POSTGRES__CREDENTIALS__USERNAME: ${POSTGRES_USER}
      DESTINATION__POSTGRES__CREDENTIALS__PASSWORD: ${POSTGRES_PASSWORD}
      DESTINATION__POSTGRES__CREDENTIALS__HOST: postgres
      DESTINATION__POSTGRES__CREDENTIALS__PORT: 5432
      DBT_PROFILES_DIR: /home/src/default_repo/dbt
      REQUIRE_USER_AUTHENTICATION: 0
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_MAIL_FROM: ${SMTP_MAIL_FROM:-}
      SMTP_SSL: ${SMTP_SSL:-False}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-True}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-False}
      STUCK_PIPELINE_MULTIPLIER: ${STUCK_PIPELINE_MULTIPLIER:-3}
    ports:
      - "${MAGE_PORT:-6789}:6789"
    volumes:
      - ./mage:/home/src
      - ./dlt:/home/dlt
      - ./dbt:/home/src/default_repo/dbt
      - ./dlt:/home/src/default_repo/dlt
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ppm-network
    restart: unless-stopped

  dbt-docs:
    image: python:3.11-slim
    container_name: ppm-dbt-docs
    working_dir: /dbt
    env_file: .env
    command: >
      bash -c "pip install dbt-postgres -q &&
               cd /dbt &&
               if [ -f target/index.html ]; then
                 python -m http.server 8080 --directory target;
               else
                 echo '[DBT-DOCS] Run: dbt docs generate first' && sleep infinity;
               fi"
    ports:
      - "${DBT_DOCS_EXTERNAL_PORT:-8081}:8080"
    volumes:
      - ./dbt:/dbt
    networks:
      - ppm-network
    restart: unless-stopped

  cloudbeaver:
    image: dbeaver/cloudbeaver:24.2.0
    container_name: ppm-cloudbeaver
    environment:
      CB_SERVER_NAME: "ppmER"
      CB_SERVER_URL: "http://localhost:${CLOUDBEAVER_EXTERNAL_PORT:-8978}"
      CB_ADMIN_NAME: ${CB_ADMIN_NAME:-admin}
      CB_ADMIN_PASSWORD: ${CB_ADMIN_PASSWORD:-admin}
    ports:
      - "${CLOUDBEAVER_EXTERNAL_PORT:-8978}:8978"
    volumes:
      - ${VOLUME_BASE_PATH:-./volumes}/cloudbeaver:/opt/cloudbeaver/workspace
      - ./cloudbeaver/conf/initial-data-sources.conf:/opt/cloudbeaver/conf/initial-data-sources.conf:ro
      - ./cloudbeaver/conf/initial-data.conf:/opt/cloudbeaver/conf/initial-data.conf:ro
      - ./cloudbeaver/conf/.cloudbeaver.auto.conf:/opt/cloudbeaver/conf/.cloudbeaver.auto.conf:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ppm-network
    restart: unless-stopped

  # ponytail: Metabase replaces PowerBI - open-source, Docker-native, zero config needed
  metabase:
    image: metabase/metabase:latest
    container_name: ppm-metabase
    environment:
      MB_DB_TYPE: postgres
      MB_DB_HOST: postgres
      MB_DB_PORT: 5432
      MB_DB_DBNAME: metabase
      MB_DB_USER: ${POSTGRES_USER}
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_ENABLE_EMBEDDING: "true"
      MB_EMBEDDING_SAMEORIGIN: "false"
    ports:
      - "${METABASE_EXTERNAL_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ppm-network
    restart: unless-stopped

  metabase-setup:
    image: alpine:3.19
    container_name: ppm-metabase-setup
    environment:
      MB_ADMIN_EMAIL: ${MB_ADMIN_EMAIL}
      MB_ADMIN_PASSWORD: ${MB_ADMIN_PASSWORD}
      MB_ADMIN_NAME: ${MB_ADMIN_NAME}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command: >
      sh -c "
        apk add --no-cache curl jq >/dev/null 2>&1 &&
        sh /setup/setup.sh
      "
    volumes:
      - ./metabase:/setup:ro
    depends_on:
      metabase:
        condition: service_started
    networks:
      - ppm-network
    restart: no

  # AI Agent Chat UI - works with any OpenAI-compatible API (Claude, GPT, Gemini, Ollama)
  agent:
    image: python:3.11-slim
    container_name: ppm-agent
    working_dir: /app
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      AGENT_DB: ppmdatastack
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # LLM providers — API keys come from .env; add new keys here as needed
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY}
    ports:
      - "${AGENT_PORT:-7860}:7860"
    volumes:
      - ./agent:/app
      - ./dbt:/dbt:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ppm-network
    restart: unless-stopped
    command: >
      sh -c "pip install -r /app/requirements.txt -q && python /app/chat.py"

  # Excel/CSV file upload with version management for business users
  upload:
    build: ./upload
    container_name: ppm-upload
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${UPLOAD_EXTERNAL_PORT:-8085}:8080"
    volumes:
      - ./upload:/app
      - ${VOLUME_BASE_PATH:-./volumes}/upload_files:/app/uploaded_files
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ppm-network
    restart: unless-stopped

  # DB-GPT — AI-powered natural language SQL interface over ppm_datawarehouse
  dbgpt:
    image: eosphorosai/dbgpt:latest
    platform: linux/amd64
    container_name: ppm-dbgpt
    env_file: .env
    environment:
      # ponytail: DeepSeek returns raw JSON without markdown wrapping (Gemini doesn't)
      LLM_API_KEY: ${GEMINI_API_KEY}
      LLM_MODEL_NAME: gemini-2.5-flash
      DB_HOST: postgres
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      LLM_API_BASE: https://generativelanguage.googleapis.com/v1beta/openai
      EMBEDDING_API_URL: https://generativelanguage.googleapis.com/v1beta/openai/embeddings
      EMBEDDING_MODEL_NAME: text-embedding-004
    command: >
      bash -c "
        /opt/.uv.venv/bin/pip install psycopg2-binary -q &&
        dbgpt start webserver --config /ppm-config/dbgpt-proxy-ppm.toml
      "
    ports:
      - "${DBGPT_PORT:-5670}:5670"
    volumes:
      - ${VOLUME_BASE_PATH:-./volumes}/dbgpt:/app/pilot
      - ./dbgpt:/ppm-config:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ppm-network
    restart: unless-stopped

  # ponytail: setup runs once to register PPM datasource and create restricted AI user
  dbgpt-setup:
    image: alpine:3.19
    container_name: ppm-dbgpt-setup
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DBGPT_AI_DB_PASS: ${DBGPT_AI_DB_PASS:-ppm_ai_123}
    command: >
      sh -c "
        apk add --no-cache curl postgresql-client >/dev/null 2>&1 &&
        PG=\"PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U $$POSTGRES_USER -d $$POSTGRES_DB\" &&
        eval \"$$PG -c \\\"DO LANG plpgsql SET search_path=public;\\\\ BEGIN IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname='ppm_ai') THEN CREATE USER ppm_ai WITH PASSWORD '$$DBGPT_AI_DB_PASS'; END IF; END;\\\\\"\" || true &&
        eval \"$$PG -c \\\"GRANT CONNECT ON DATABASE $$POSTGRES_DB TO ppm_ai\\\"\" || true &&
        eval \"$$PG -c \\\"GRANT USAGE ON SCHEMA core,mart,staging TO ppm_ai\\\"\" || true &&
        eval \"$$PG -c \\\"GRANT SELECT ON ALL TABLES IN SCHEMA core TO ppm_ai\\\"\" || true &&
        eval \"$$PG -c \\\"GRANT SELECT ON ALL TABLES IN SCHEMA mart TO ppm_ai\\\"\" || true &&
        eval \"$$PG -c \\\"GRANT SELECT ON ALL TABLES IN SCHEMA staging TO ppm_ai\\\"\" || true &&
        eval \"$$PG -c \\\"ALTER ROLE ppm_ai SET search_path = mart,core,staging\\\"\" || true &&
        echo 'PostgreSQL AI user ready' &&
        echo 'Waiting for DB-GPT...' &&
        until curl -sf http://dbgpt:5670/api/health; do sleep 5; done &&
        EXISTING=$$(curl -s http://dbgpt:5670/api/v1/chat/db/list | grep -c ppm_datawarehouse) &&
        PAYLOAD=\"{\\\"db_type\\\":\\\"postgresql\\\",\\\"db_name\\\":\\\"$$POSTGRES_DB\\\",\\\"db_host\\\":\\\"postgres\\\",\\\"db_port\\\":5432,\\\"db_user\\\":\\\"ppm_ai\\\",\\\"db_pwd\\\":\\\"$$DBGPT_AI_DB_PASS\\\",\\\"comment\\\":\\\"PPM Data Warehouse\\\"}\" &&
        if [ \"$$EXISTING\" = \"0\" ]; then
          curl -sf -X POST http://dbgpt:5670/api/v1/chat/db/add -H 'Content-Type: application/json' -d \"$$PAYLOAD\"
        else
          curl -sf -X POST http://dbgpt:5670/api/v1/chat/db/edit -H 'Content-Type: application/json' -d \"$$PAYLOAD\"
        fi &&
        echo 'DB-GPT setup complete'
      "
    depends_on:
      postgres:
        condition: service_healthy
      dbgpt:
        condition: service_started
    networks:
      - ppm-network
    restart: no

  # Central portal - unified UI with role-based access for all services
  portal:
    build: ./portal
    container_name: ppm-portal
    environment:
      # Data warehouse (read-only stats)
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      # Service ports
      MAGE_EXTERNAL_PORT: ${MAGE_PORT:-6789}
      DBT_DOCS_EXTERNAL_PORT: ${DBT_DOCS_EXTERNAL_PORT:-8081}
      METABASE_EXTERNAL_PORT: ${METABASE_EXTERNAL_PORT:-3000}
      CLOUDBEAVER_EXTERNAL_PORT: ${CLOUDBEAVER_EXTERNAL_PORT:-8978}
      UPLOAD_EXTERNAL_PORT: ${UPLOAD_EXTERNAL_PORT:-8085}
      AGENT_PORT: ${AGENT_PORT:-7860}
      DBGPT_PORT: ${DBGPT_PORT:-5670}
      DBGPT_INTERNAL_URL: http://dbgpt:5670
      LLM_MODEL_NAME: gemini-2.5-flash
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      METABASE_URL: http://metabase:3000
      MB_ADMIN_EMAIL: ${MB_ADMIN_EMAIL}
      MB_ADMIN_PASSWORD: ${MB_ADMIN_PASSWORD}
      # Portal auth
      PORTAL_ADMIN_PASS: ${PORTAL_ADMIN_PASS}
      PORTAL_DEV_PASS: ${PORTAL_DEV_PASS}
      PORTAL_ANALYST_PASS: ${PORTAL_ANALYST_PASS}
      PORTAL_USER_PASS: ${PORTAL_USER_PASS}
    ports:
      - "${PORTAL_EXTERNAL_PORT:-9000}:9000"
    volumes:
      - ./portal:/app
      - ./assets:/app/static/assets:ro
      - ./dbt/models:/dbt/models:ro
      - ./dlt:/dlt:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.env:/run/stack.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ppm-network
    restart: unless-stopped

networks:
  ppm-network:
    driver: bridge

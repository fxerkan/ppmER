    description: >
      Missing effort analysis with employee and manager drill-downs
    depends_on:
      - ref('rpt_missing_effort')
    owner:
      name: PPM Team
      email: admin@jppm.local

  - name: ppm_distributed_effort
    label: "PPM - Finance - Distributed Effort"

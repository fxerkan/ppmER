version: 2

exposures:

  - name: ppm_home
    label: "PPM Home"
    type: dashboard
    maturity: high
    url: "http://localhost:3000/dashboard/19"
    description: >
      PPM Insights homepage with links to all dashboards
    depends_on:
    owner:
      name: PPM Team
      email: admin@jppm.local

  - name: ppm_executive_overview
    label: "PPM - Executive - Overview"
    type: dashboard
    maturity: high

version: 2

sources:
  - name: raw_sharepoint
    description: Raw SharePoint data loaded via dlt from SharePoint Online lists
    database: ppm_datawarehouse
    schema: raw_sharepoint
    tables:
      - name: projects
        description: SharePoint Projects list - master project registry mapping Jira project IDs to project metadata - https://example.sharepoint.com/sites/ppm/Lists/Projects/AllItems.aspx
        columns:
          - name: id
            description: SharePoint item ID (unique within list)
          - name: title
            description: Project title/name
          - name: id_project
            description: Jira project ID mapping
          - name: field_0
            description: Numeric project identifier
          - name: field_3
            description: Project type category (e.g., Maintenance & CRs)
          - name: modified
            description: Last modification timestamp
          - name: created
            description: Creation timestamp

      - name: proje_inv
        description: Project Inventory - detailed project tracking with status, timeline, and risk information - 
        columns:
          - name: id
            description: SharePoint item ID (unique within list)
          - name: title
            description: Project code (e.g., M0072)
          - name: field_1
            description: Project internal name
          - name: field_2
            description: Customer/brand name
          - name: field_4
            description: Product family (e.g., PF & POS, Core Banking)
          - name: field_5
            description: Product category
          - name: field_7
            description: Product subcategory
          - name: field_8
            description: Hosting type (HostingCustomer, HostingFirmaX)
          - name: field_9
            description: Business model (B2B, B2B2C)
          - name: field_11
            description: Project code reference
          - name: field_12
            description: Project phase/status
          - name: field_13
            description: Related Jira project ID
          - name: on_track_x002f_delayed
            description: Project tracking status (On Track, Delayed)
          - name: status_progress
            description: Current progress description and notes
          - name: project_timeline
            description: Timeline milestones and dates
          - name: project_scope
            description: Scope definition
          - name: project_category
            description: Category classification (Customer, Internal)
          - name: executive_dashboard
            description: Flag for executive dashboard visibility (1/0)
          - name: is_strategic_portfolio_x003fx
            description: Strategic portfolio flag (1/0)
          - name: risk_x002f_problem
            description: Current risks and problems description
          - name: scope_risk
            description: Scope risk status (On Track, Risky)
          - name: escalation
            description: Escalation count/level
          - name: customer_light
            description: Customer responsibility indicator
          - name: risk_var_m_x0131__x003fx
            description: Risk exists flag
          - name: project_manager_lookup_id
            description: Project manager lookup reference
          - name: portfolio_manager_lookup_id
            description: Portfolio manager lookup reference
          - name: it_tribe_lead_lookup_id
            description: IT tribe lead lookup reference
          - name: modified
            description: Last modification timestamp
          - name: created
            description: Creation timestamp

      - name: proje_risks
        description: Project Risks - risk tracking for projects - 
        columns:
          - name: id
            description: SharePoint item ID (unique within list)
          - name: title
            description: Project code reference
          - name: risk
            description: Risk description
          - name: risk_durumu
            description: Risk status (Risk Giderildi, Active, etc.)
          - name: project_information_lookup_id
            description: Link to project in proje_inv list
          - name: modified
            description: Last modification timestamp
          - name: created
            description: Creation timestamp

      - name: issue_type
        description: Issue Type master data - Jira issue type classifications - 
        columns:
          - name: id
            description: SharePoint item ID (unique within list)
          - name: title
            description: Issue type name (e.g., Analysis, Development, Testing)
          - name: field_1
            description: Expense classification (Expensed, Capitalized)
          - name: field_2
            description: Jira issue type ID
          - name: category
            description: Category (SDLC Tasks, Infrastructure & Technical Works, General Tasks, Old Tasks)
          - name: active
            description: Active status (Evet/Hayir)
          - name: modified
            description: Last modification timestamp
          - name: created
            description: Creation timestamp

      - name: issue_type_inventory
        description: Issue Type Inventory - task type definitions with descriptions - 
        columns:
          - name: id
            description: SharePoint item ID (unique within list)
          - name: title
            description: Task type title
          - name: task_type
            description: Task type category (General Tasks, SDLC Tasks, etc.)
          - name: task_type_description
            description: Detailed task type description
          - name: expensed_x002f_capitalized
            description: Expense classification (Expensed, Capitalized)
          - name: description
            description: Full description of the task type
          - name: modified
            description: Last modification timestamp
          - name: created
            description: Creation timestamp

      - name: pbi_info
        description: PBI Info - Power BI project/team mapping information - 
        columns:
          - name: id
            description: SharePoint item ID (unique within list)
          - name: title
            description: Jira project ID
          - name: field_1
            description: Team/project name mapping for Power BI
          - name: modified
            description: Last modification timestamp
          - name: created
            description: Creation timestamp

      - name: financial_adjustment
        description: Financial Adjustment - Monthly financial adjustments per project from Excel file - 
        columns:
          - name: year
            description: Year for the financial adjustments
          - name: project_id
            description: Project ID (Jira project ID)
          - name: project_name
            description: Project name
          - name: jan_uary_adjusted
            description: January adjustment amount
          - name: february_adjusted
            description: February adjustment amount
          - name: march_adjusted
            description: March adjustment amount
          - name: april_adjusted

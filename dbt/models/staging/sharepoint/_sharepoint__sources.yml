          - name: may_adjusted
            description: May adjustment amount
          - name: june_adjusted
            description: June adjustment amount
          - name: july_adjusted
            description: July adjustment amount
          - name: august_adjusted
            description: August adjustment amount
          - name: september_adjusted
            description: September adjustment amount
          - name: october_adjusted
            description: October adjustment amount
          - name: november_adjusted
            description: November adjustment amount
          - name: _etl_date
            description: ETL load timestamp

      - name: capex_opex_adjustment
        description: CAPEX/OPEX Adjustment - Monthly CAPEX/OPEX ratio adjustments per project from Excel file - 
        columns:

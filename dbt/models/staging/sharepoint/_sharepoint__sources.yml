          - name: _etl_date
            description: ETL load timestamp
            
      - name: operation_efforts
        description: Operation Efforts - Monthly planned and actual effort hours per project from Excel file - 
        columns:
          - name: year
            description: Year for the operation efforts
          - name: project_id
            description: Project ID (Jira project ID)
          - name: project_name

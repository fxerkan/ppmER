{% extends "base.html" %}
{% block title %} — Dashboards{% endblock %}
{% block active_metabase %}active{% endblock %}

{% block content %}
<div class="flex" style="height: calc(100vh - 3.5rem);">
  <div id="dash-list" class="w-72 shrink-0 bg-white border-r border-slate-200 overflow-y-auto flex flex-col">
    <div class="px-4 py-3 text-sm font-semibold text-slate-500 uppercase tracking-wide border-b border-slate-100">
      Metabase Reports
    </div>
    <div id="dashboard-items" class="flex-1 overflow-y-auto p-2 space-y-1">
      <div class="text-sm text-slate-400 text-center py-8">Loading dashboards...</div>
    </div>
  </div>
  <div id="dash-main" class="flex-1 flex flex-col bg-slate-50">
    <div id="dash-placeholder" class="flex-1 flex items-center justify-center text-slate-400 text-sm">
      Select a dashboard from the list
    </div>
    <iframe id="dash-iframe" src="" class="flex-1 w-full border-0 hidden"></iframe>
  </div>
</div>

<script>
  fetch('/api/metabase-dashboards')
    .then(r => r.json())
    .then(data => {
      const container = document.getElementById('dashboard-items');
      if (data.error || !data.dashboards.length) {
        container.innerHTML = '<div class="text-sm text-slate-400 text-center py-8">No dashboards found.</div>';
        return;
      }
      container.innerHTML = '';
      data.dashboards.forEach(d => {
        const item = document.createElement('div');
        item.className = 'px-3 py-2 rounded-lg cursor-pointer text-sm text-slate-700 hover:bg-blue-50 hover:text-blue-700 transition-colors';
        item.textContent = d.name;
        item.title = d.description || d.name;
        item.addEventListener('click', () => {
          document.querySelectorAll('#dashboard-items > div').forEach(el => el.classList.remove('bg-blue-50', 'text-blue-700', 'font-semibold'));
          item.classList.add('bg-blue-50', 'text-blue-700', 'font-semibold');
          const url = d.public_uuid
            ? 'http://localhost:3000/public/dashboard/' + d.public_uuid
            : 'http://localhost:3000/dashboard/' + d.id;
          const iframe = document.getElementById('dash-iframe');
          iframe.src = url;
          iframe.classList.remove('hidden');
          document.getElementById('dash-placeholder').classList.add('hidden');
        });
        container.appendChild(item);
      });
    })
    .catch(() => {
      document.getElementById('dashboard-items').innerHTML = '<div class="text-sm text-red-500 text-center py-8">Failed to load dashboards.</div>';
    });
</script>
{% endblock %}

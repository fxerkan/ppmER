<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PPM Data Stack — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 to-slate-700 flex items-center justify-center">
  <div class="w-full max-w-md">

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-10">
      <!-- Logo / Title -->
      <div class="text-center mb-8">
        <div class="text-5xl mb-3">📊</div>
        <h1 class="text-2xl font-bold text-slate-800">PPM Data Stack</h1>
        <p class="text-sm text-slate-500 mt-1">Your Project Portfolio Intelligence Platform</p>
      </div>

      {% if error %}
      <div class="mb-4 px-4 py-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">
        {{ error }}
      </div>
      {% endif %}

      <!-- Form -->
      <form method="post" action="/login" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1" for="username">Username</label>
          <input id="username" name="username" type="text" required autocomplete="username"
            class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1" for="password">Password</label>
          <input id="password" name="password" type="password" required autocomplete="current-password"
            class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
        </div>
        <button type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition-colors">
          Sign In
        </button>
      </form>

      <!-- Demo Accounts -->
      <div class="mt-8 pt-6 border-t border-slate-100">
        <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Demo Accounts</p>
        <div class="space-y-2">
          <div class="flex justify-between text-xs">
            <span class="font-mono bg-slate-100 px-2 py-1 rounded text-slate-700">admin / admin123</span>
            <span class="text-slate-500 self-center">Full access</span>
          </div>
          <div class="flex justify-between text-xs">
            <span class="font-mono bg-slate-100 px-2 py-1 rounded text-slate-700">developer / dev123</span>
            <span class="text-slate-500 self-center">Developer tools</span>
          </div>
          <div class="flex justify-between text-xs">
            <span class="font-mono bg-slate-100 px-2 py-1 rounded text-slate-700">analyst / analyst123</span>
            <span class="text-slate-500 self-center">Power user</span>
          </div>
          <div class="flex justify-between text-xs">
            <span class="font-mono bg-slate-100 px-2 py-1 rounded text-slate-700">user / user123</span>
            <span class="text-slate-500 self-center">View only</span>
          </div>
        </div>
      </div>
    </div>

  </div>
</body>
</html>

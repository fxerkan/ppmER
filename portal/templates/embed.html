{% extends "base.html" %}
{% block title %} — {{ service_name }}{% endblock %}

{% block content %}
<div class="flex flex-col" style="height: calc(100vh - 3.5rem);">
  <div class="flex items-center px-4 py-2 bg-white border-b border-slate-200 gap-3 shrink-0">
    <a href="/dashboard" class="flex items-center gap-1 text-sm text-slate-600 hover:text-blue-600 transition-colors font-medium">
      ← Dashboard
    </a>
    <span class="text-slate-300">|</span>
    <span class="text-sm font-semibold text-slate-700">{{ service_name }}</span>
    <a href="{{ service_url }}" target="_blank" class="ml-auto text-xs text-slate-400 hover:text-blue-500 transition-colors">
      Open in new tab ↗
    </a>
  </div>
  <iframe src="{{ service_url }}" class="flex-1 w-full border-0"></iframe>
</div>
{% endblock %}

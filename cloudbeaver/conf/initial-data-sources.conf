{
    "folders": {},
    "connections": {
        "postgresql-container": {
            "provider": "postgresql",
            "driver": "postgres-jdbc",
            "name": "PPM Database (Docker)",
            "description": "PostgreSQL via Docker network (for container access)",
            "save-password": true,
            "show-system-objects": false,
            "read-only": false,
            "configuration": {
                "host": "postgres",
                "port": "5432",
                "database": "ppm_datawarehouse",
                "url": "jdbc:postgresql://postgres:5432/ppm_datawarehouse",
                "configurationType": "MANUAL",
                "type": "dev",
                "auth-model": "native",
                "user": "ppm_user",
                "password": "change_me_strong_password",
                "provider-properties": {
                    "@dbeaver-show-non-default-db@": "false"
                }
            }
        }
    },
    "connection-types": {
        "dev": {
            "name": "Development",
            "color": "255,255,255",
            "description": "Development database",
            "auto-commit": true,
            "confirm-execute": false,
            "confirm-data-change": false,
            "auto-close-transactions": false
        }
    }
}

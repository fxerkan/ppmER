data_integration: null
description: |
  Quick Master Jira Data Load Pipeline - Optimized for Speed

  Ultra-fast version of master_daily_jira pipeline. Target: <10 minutes total runtime.
  Excludes: PBB issues, issue links, project properties, custom fields, tests, docs, mart models, snapshots.

  --mode=daily parameter for merge/upsert

  Target Schemas:
  - raw_jira: Raw Jira data from DLT (merge/upsert mode)
  - raw_sharepoint: Raw SharePoint data from DLT (merge/upsert mode)
  - staging: Cleaned views with deduplication
  - core: Dimension and fact tables only

  Core Models Included:
  - Dimensions (7): dim_calc_period, dim_calendar, dim_users, dim_hr, dim_turkish_holidays, dim_projects, dim_issues
  - Facts (2): fact_worklogs, fact_project_budget

  Excluded for Speed:
  - Snapshot models: *_snapshot (run separately for monthly reports)
  - Bridge tables: map_* (not needed for daily reporting)
  - Mart layer: mart.* (business aggregations run separately)

  Performance:
  - DBT Runtime: ~1.5 minutes (dim: 46s, fact: 44s)
  - Total Pipeline: ~6-8 minutes (includes data loading)

  Data Sources:
  - Jira Cloud (projects, users, issues, subtasks, worklogs)
  - SharePoint Online (via manual models and staging)

